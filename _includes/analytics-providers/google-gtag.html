<!-- Cookie consent plugin following https://peateasea.de/enabling-cookie-consent-with-jekyll-minimal-mistakes/ -->

<script>
  function loadGAonConsent() {
    // Load Google Analytics script dynamically
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}';
    document.head.appendChild(s);

    // Initialize Google Analytics
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.analytics.google.tracking_id }}', { 
      'anonymize_ip': {{ site.analytics.google.anonymize_ip | default: false }}
    });
  }
</script>
